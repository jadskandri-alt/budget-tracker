<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real Madrid</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --text: #111827;
      --accent: #fbbf24;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #ffffff, var(--bg));
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
    }

    .card {
      width: min(90vw, 420px);
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.12);
      padding: 24px;
      text-align: center;
      border-top: 5px solid var(--accent);
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 16px;
      letter-spacing: 0.4px;
    }

    img {
      width: 220px;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    p {
      margin-top: 14px;
      font-size: 0.95rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Real Madrid</h1>
    <img
      src="https://upload.wikimedia.org/wikipedia/en/5/56/Real_Madrid_CF.svg"
      alt="Logo du Real Madrid"
    >
    <p>Hala Madrid</p>
  </main>
</body>
</html>
